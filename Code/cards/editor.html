<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lernset Editor</title>

  <!-- CSS FIX -->
  <link rel="stylesheet" href="../home/frontend/style.css">
</head>

<body>

<div id="container" class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Editor</div>
  </div>

  <!-- LERNSET -->
  <div class="card profile-card">
    <button onclick="deleteSet()" style="background: transparent; border: none; cursor: pointer;">🗑️ Lernset löschen</button>

  <h3>
    <button id="emoji" onclick="toggleEmojiPicker()"
      style="background: transparent; border: none; font-size: 22px; cursor: pointer;">
      📘
    </button>

    <div id="emojiPicker" class="emoji-picker hidden"></div>

    <span id="currentSetName"></span>
  </h3>

  

    
    <div class="small-text" id="description"></div>

    <div style="margin-top: 30px; margin-bottom: 5px;">Name des Lernsets:</div>
    <input id="setName" placeholder="Name des Lernsets">

    <div style="margin-top: 30px; margin-bottom: 5px;">Beschreibung des Lernsets:</div>
    <input id="setDescription" placeholder="Beschreibung des Lernsets">


    <div style="margin-top: 30px; margin-bottom: 10px;">Modus:</div>
    <div class="mode-switch">
      <button class="mode active" data-mode="self-compare">Selbst vergleichen</button>
      <button class="mode" data-mode="input-answer">Antwort eingeben</button>
    </div>
  </div>

  <!-- KARTEN -->
  <div id="cardContainer">
    <div class="card">
      <button onclick="deleteCard(this)" style="background: transparent; border: none;">
        🗑️ Karte löschen
      </button>

      <h2>Karte</h2>

      <h4>Frage</h4>
      <input class="frage" placeholder="Frage eingeben">

      <h4>Antwort</h4>
      <input class="antwort" placeholder="Antwort eingeben">
    </div>
  </div>

  <button class="button" onclick="addCard()" style="margin-top: 20px;">
    + Karte hinzufügen
  </button>

  <!-- PREVIEW -->
  <div class="card" style="margin-top: 40px;">
    <h4>Vorschau</h4>
    <p class="small-text">Hier wird dein Lernset später angezeigt</p>
  </div>

  <!-- SAVE -->
  <button class="button" style="margin-top: 30px;"
          onclick="saveAll(); saveName(); saveDescription(); saveMode();">
    + Speichern
  </button>

  <div style="height: 80px;"></div>

</div>

<!-- NAVIGATION -->
<script src="../app-nav.js"></script>
<app-nav></app-nav>

<!-- EDITOR LOGIC (KRITISCH) -->
<script src="./editor.js"></script>

</body>
</html>
