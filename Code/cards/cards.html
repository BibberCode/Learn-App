<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karten</title>

<link rel="stylesheet" href="Code/home/frontend/style.css">

</head>

<body>

   <div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">LernSets</div>
    <div class="streak">🔥 <span id="streak"></span> Streak</div>
  </div>

  <!-- NEUES LERNSET -->
  <div class="card">
    <h3>Neues Lernset erstellen</h3>

    <input id="title" type="text" placeholder="Titel eingeben">
    <input id="description" type="text" placeholder="Beschreibung (optional)">

    <button style="margin-top: 12px;" class="button" onclick="addLearnset()">
      Erstellen
    </button>
  </div>

  <!-- LERNSETS ÜBERSICHT -->
  <div class="card">
    <h3>Deine Lernsets bearbeiten</h3>

    <div class="grid" id="learnsetList"></div>
  </div>

  <div style="height: 80px;"></div>

</div>


<script src="Code/app-nav.js" defer></script>
<app-nav></app-nav>

<script src="Code/home/frontend/times.js"></script>
<script src="Code/home/frontend/streak.js" defer></script>
<script src="Code/cards/learnsets.js" defer></script>

</body>
</html>
