<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karten</title>

<link rel="stylesheet" href="/Code/home/frontend/style.css">

</head>

<body>

   <div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">LernSets</div>
    <div class="streak">🔥 5 Tage</div>
  </div>

  <!-- NEUES LERNSET -->
  <div class="card">
    <h3>Neues Lernset erstellen</h3>

    <input type="text" placeholder="Titel eingeben">
    <input type="text" placeholder="Beschreibung (optional)">

    <div style="margin-top: 12px;" class="button">
      Erstellen
    </div>
  </div>

  <!-- LERNSETS ÜBERSICHT -->
  <div class="card">
    <h3>Deine Lernsets</h3>

    <div class="grid">

      <div class="small-card">
        <h4>Mathe</h4>
        <p>24 Karten • 70%</p>
      </div>

      <div class="small-card">
        <h4>Englisch</h4>
        <p>40 Karten • 45%</p>
      </div>

      <div class="small-card">
        <h4>Geschichte</h4>
        <p>18 Karten • 90%</p>
      </div>

    </div>
  </div>

  <!-- BEARBEITEN -->
  <div class="card">
    <h3>Lernset bearbeiten</h3>

    <input type="text" value="Mathe">
    <input type="text" value="Beschreibung...">

    <div class="grid" style="margin-top: 12px;">

      <div class="small-card">
        <h4>Karte 1</h4>
        <p>Frage / Antwort</p>
      </div>

      <div class="small-card">
        <h4>Karte 2</h4>
        <p>Frage / Antwort</p>
      </div>

    </div>

    <div style="margin-top: 12px;" class="button">
      Speichern
    </div>
  </div>

    <div style="height: 80px;"></div>

</div>




<script src="/Code/app-nav.js" defer></script>
<app-nav></app-nav>

<script src="/Code/home/frontend/script.js"></script>

</body>
</html>
