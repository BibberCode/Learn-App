<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistik</title>

<link rel="stylesheet" href="../home/frontend/style.css">

</head>

<body>

    <div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Lernen</div>
    <div class="streak">📊 <span id="progressText">0 / 0</span></div>
  </div>

  <!-- PROGRESS -->
  <div class="card">
    <div class="progress-bar">
      <div id="progressBar" class="progress" style="width:0%"></div>
    </div>
  </div>

  <!-- KARTE -->
  <div class="card" id="flashcard">

    <h2 id="question">Frage</h2>
    <input id="userAnswer" placeholder="Deine Antwort" style="margin-top: 0px;"></input>

    <h5 id="evaluation" style="display:none; margin-top:15px;"></h5>
  </div>

  <!-- CONFIDENCE -->
  <div class="card" id="confidenceBox">

    <h3>Wie sicher warst du?</h3>

    <div class="grid" style="justify-items: center; display: flex;">
      <button class="button" data-level="5">❌ Geraten</button>
      <button class="button" data-level="4">👎 Unsicher</button>
      <button class="button" data-level="3">😐 Vielleicht</button>
      <button class="button" data-level="2">👍 Sicher</button>
      <button class="button" data-level="0">✅ Sehr sicher</button>
    </div>

  </div>


  <!-- AKTIONEN -->
  <div class="card" id="nextBtn">

    <button class="button" style="margin-top:10px; display:block;" onclick="nextCard()">
      Nächste Karte
    </button>

  </div>

</div>

<div style="margin-bottom: 80px;"

<!-- NAV -->
<script src="../app-nav.js" defer></script>
<app-nav></app-nav>

<!-- SCRIPT -->
<script src="../home/frontend/times.js" defer></script>
<script src="./learning.js" defer></script>

</body>
</html>
