<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil</title>

<link rel="stylesheet" href="Code/home/frontend/style.css">

</head>

<body>

    <div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Profil</div>
    <div class="streak">🔥 <span id="streak">0</span> Streak</div>
  </div>

  <!-- PROFIL CARD -->
  <div class="card profile-card">

    <button class="avatar" onclick="document.getElementById('fileInput').click()">
    <img id="avatarImg" alt="Profilbild" src="Code/home/frontend/avatar-placeholder.png">
    </button>
    <input type="file" id="fileInput" accept="image/*" hidden>

    <h2 id="name">Max</h2>
    <p class="subtext">Lernender</p>

    <div class="progress-bar">
      <div class="progress" id="bar"></div>
    </div>

    <p><strong><span id="timer"></span> / <span id="maxMinutes"></span> min</strong></p>

    <input id="nameInput" placeholder="Name ändern">
    <div class="button" onclick="saveName()" style="margin-top: 10px;">Name ändern</div>


    <input id="maxMinutesInput" placeholder="Lernzeit festlegen" style="margin-top: 30px;">
    <div class="button" onclick="setMaxMinutes()" style="margin-top: 10px;">Lernzeit festlegen</div>
  </div>

  <!-- STATS -->
  <div class="card">
    📊
    <h3>Statistik</h3>

    <div class="grid">
      <div class="small-card">
        <h4>🔥 5</h4>
        <p>Tage Streak</p>
      </div>

      <div class="small-card">
        <h4>12</h4>
        <p>Lernsets</p>
      </div>

      <div class="small-card">
        <h4>84%</h4>
        <p>Durchschnitt</p>
      </div>

      <div class="small-card">
        <h4 id="totalTime">0 min</h4>
        <p>Gesamtzeit</p>
      </div>
    </div>
  </div>

    <div style="height: 80px;"></div>

</div>



<script src="/Code/app-nav.js" defer></script>
<app-nav></app-nav>

<script src="Code/profile/profile-script.js"></script>
<script src="Code/home/frontend/times.js"></script>
<script src="Code/home/frontend/streak.js" defer></script>

</body>
</html>
