<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zuhause - Lern doch noch etwas</title>

<link rel="stylesheet" href="./Code/home/frontend/style.css">

</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div>☰</div>
    <div class="logo">📖 Confident Learnin</div>
    <div class="streak">🔥 <span id="streak"></span> Streak</div>
  </div>

  <!-- GREETING -->
  <div class="card">
    <h2>Hallo <span id="name">Lernender</span>! 👋</h2>
    <p>Bereit, heute etwas zu lernen?</p>

    <div class="progress-bar">
      <div class="progress" id="bar"></div>
    </div>

    <p><strong><span id="timer"></span> / <span id="maxMinutes"></span> min</strong></p>
  </div>

  <!-- WEITERLERNEN -->
  <h3 style="margin-top: 25px;">Lernsets üben</h3>

  <div class="card">
    <div class="grid" id="learnsetListLearn"></div>
  </div>

  <!-- LERNSETS BEARBEITEN -->
  <h3 style="margin-top: 25px;">Lernsets bearbeiten</h3>

  <div class="card">
    <div class="grid" id="learnsetListEdit"></div>
  </div>

  <!-- HOW IT WORKS -->
  <h3 style="margin-top: 25px;">So funktioniert es</h3>

  <div class="card">
    <div class="grid">
      <div class="small-card">1️⃣<br>Karte ansehen</div>
      <div class="small-card">2️⃣<br>Antwort geben</div>
      <div class="small-card">3️⃣<br>Selbsteinschätzung</div>
    </div>

    <div class="button" style="margin-top: 10px;" onclick="location.href='./Code/cards/cards.html'">
      + Neues Lernset erstellen
    </div>
  </div>

  <div style="height: 80px;"></div>

</div>

<!-- NAV -->
<script src="./Code/app-nav.js" defer></script>
<app-nav></app-nav>

<!-- SCRIPTS -->
<script src="./Code/home/frontend/uiTime.js" defer></script>
<script src="./Code/profile/profile-script.js" defer></script>
<script src="./Code/home/frontend/streak.js" defer></script>
<script src="./Code/home/frontend/setsRenderHome.js" defer></script>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#111111">

</body>
</html>
